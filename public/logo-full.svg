    <circle cx="30" cy="14" r="3.5" fill="#EB9E5B"/>
    <!-- Orange swoosh/checkmark -->
    <path d="M22 34C22 34 26 40 34 40C42 40 48 32 48 32" stroke="url(#orangeGrad)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Orange dot -->
    <circle cx="28" cy="18" r="4" fill="url(#orangeGrad)"/>
    <!-- Sparkle/star -->
    <path d="M46 10L48 6L50 10L54 12L50 14L48 18L46 14L42 12Z" fill="url(#orangeGrad)"/>
  </g>
  <!-- Wordmark -->
  <g transform="translate(68, 0)">
