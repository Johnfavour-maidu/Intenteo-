<svg xmlns="http://www.w3.org/2000/svg" width="240" height="80" viewBox="0 0 240 80" fill="none">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5A1F"/>
      <stop offset="50%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#FFB000"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A1480"/>
      <stop offset="100%" stop-color="#1E0E6B"/>
    </linearGradient>
  </defs>
  <!-- Icon mark -->
  <g transform="translate(0, 8)">
    <!-- Outer circle (indigo) -->
    <path d="M30 4C15.64 4 4 15.64 4 30C4 44.36 15.64 56 30 56C44.36 56 56 44.36 56 30" stroke="url(#indigoGrad)" stroke-width="5" fill="none"/>
