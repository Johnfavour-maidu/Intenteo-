      <tspan fill="#1E0E6B">intent</tspan><tspan fill="url(#orangeGrad)">eo</tspan>
    </text>
    <!-- Tagline -->
    <line x1="0" y1="58" x2="2" y2="58" stroke="#1E0E6B" stroke-width="1.5"/>
    <text x="8" y="61" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1E0E6B" letter-spacing="1.5">Live with Intentionality</text>
    <line x1="148" y1="58" x2="150" y2="58" stroke="#EB9E5B" stroke-width="1.5"/>
  </g>
